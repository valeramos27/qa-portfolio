<svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#C0392B"/>
    </marker>
    <marker id="arr-grn" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1D5C3A"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="#FAFAF8" rx="4"/>

  <!-- Title bar -->
  <rect width="1100" height="44" fill="#1A1A18" rx="4"/>
  <text x="20" y="27" fill="white" font-size="14" font-weight="bold">BPMN 2.0 — Bank Transfer Process Flow</text>
  <text x="20" y="40" fill="#8A8A84" font-size="9">Valentina Ramos · QA Analyst · Portfolio Sample · draw.io / BPMN 2.0</text>

  <!-- Pool border -->
  <rect x="10" y="52" width="1080" height="458" fill="none" stroke="#CCCCAA" stroke-width="1" rx="2"/>

  <!-- Lane: Customer -->
  <rect x="10" y="52" width="36" height="220" fill="#F5F2EB" stroke="#CCCCAA" stroke-width="0.5"/>
  <text x="28" y="182" text-anchor="middle" fill="#8A8A84" font-size="10" transform="rotate(-90,28,182)" letter-spacing="1">CUSTOMER</text>

  <!-- Lane: Bank System -->
  <rect x="10" y="272" width="36" height="238" fill="#F0F0EA" stroke="#CCCCAA" stroke-width="0.5"/>
  <text x="28" y="402" text-anchor="middle" fill="#8A8A84" font-size="10" transform="rotate(-90,28,402)" letter-spacing="1">BANK SYSTEM</text>

  <!-- Lane divider -->
  <line x1="46" y1="272" x2="1090" y2="272" stroke="#CCCCAA" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── CUSTOMER LANE ── -->

  <!-- START EVENT -->
  <circle cx="100" cy="152" r="20" fill="white" stroke="#1D5C3A" stroke-width="2.5"/>
  <circle cx="100" cy="152" r="11" fill="#1D5C3A"/>
  <text x="100" y="188" text-anchor="middle" fill="#444" font-size="9">Start</text>
  <text x="100" y="199" text-anchor="middle" fill="#444" font-size="9">Transfer</text>

  <!-- TASK: Enter transfer details -->
  <rect x="148" y="126" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="148" y="126" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="148" y="130" width="120" height="6" fill="#E8F4EE"/>
  <text x="208" y="147" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Enter Transfer</text>
  <text x="208" y="161" text-anchor="middle" fill="#1A1A18" font-size="10">Details</text>
  <text x="208" y="192" text-anchor="middle" fill="#8A8A84" font-size="8">User Task</text>

  <!-- GATEWAY: Confirm? -->
  <polygon points="320,152 345,127 370,152 345,177" fill="white" stroke="#B87333" stroke-width="1.5"/>
  <text x="345" y="156" text-anchor="middle" fill="#B87333" font-size="10" font-weight="bold">?</text>
  <text x="345" y="192" text-anchor="middle" fill="#444" font-size="8">Confirm</text>
  <text x="345" y="202" text-anchor="middle" fill="#444" font-size="8">Details?</text>

  <!-- No branch up -->
  <line x1="345" y1="127" x2="345" y2="90" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="345" y1="90" x2="208" y2="90" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="208" y1="90" x2="208" y2="126" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="360" y="108" fill="#C0392B" font-size="9">No — Edit</text>

  <!-- Yes label -->
  <text x="388" y="148" fill="#1D5C3A" font-size="9">Yes</text>

  <!-- TASK: Review confirmation -->
  <rect x="400" y="126" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="400" y="126" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="400" y="130" width="120" height="6" fill="#E8F4EE"/>
  <text x="460" y="147" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Review &amp;</text>
  <text x="460" y="161" text-anchor="middle" fill="#1A1A18" font-size="10">Authorize</text>
  <text x="460" y="192" text-anchor="middle" fill="#8A8A84" font-size="8">User Task</text>

  <!-- RECEIVE EVENT: Notification -->
  <circle cx="820" cy="152" r="20" fill="white" stroke="#1D5C3A" stroke-width="1.5"/>
  <rect x="810" y="144" width="20" height="14" rx="1" fill="none" stroke="#1D5C3A" stroke-width="1.5"/>
  <polyline points="810,144 820,154 830,144" fill="none" stroke="#1D5C3A" stroke-width="1.2"/>
  <text x="820" y="188" text-anchor="middle" fill="#444" font-size="9">Receive</text>
  <text x="820" y="199" text-anchor="middle" fill="#444" font-size="9">Notification</text>

  <!-- END EVENT -->
  <circle cx="980" cy="152" r="20" fill="none" stroke="#1D5C3A" stroke-width="3"/>
  <circle cx="980" cy="152" r="13" fill="#1D5C3A"/>
  <text x="980" y="188" text-anchor="middle" fill="#444" font-size="9">Transfer</text>
  <text x="980" y="199" text-anchor="middle" fill="#444" font-size="9">Complete</text>

  <!-- END ERROR -->
  <circle cx="980" cy="230" r="16" fill="none" stroke="#C0392B" stroke-width="2.5"/>
  <circle cx="980" cy="230" r="10" fill="#C0392B"/>
  <text x="980" y="254" text-anchor="middle" fill="#C0392B" font-size="9">Transfer</text>
  <text x="980" y="265" text-anchor="middle" fill="#C0392B" font-size="9">Failed</text>

  <!-- ── BANK SYSTEM LANE ── -->

  <!-- TASK: Validate balance -->
  <rect x="148" y="296" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="148" y="296" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="148" y="300" width="120" height="6" fill="#E8F4EE"/>
  <text x="208" y="317" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Validate</text>
  <text x="208" y="331" text-anchor="middle" fill="#1A1A18" font-size="10">Balance</text>
  <text x="208" y="362" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- GATEWAY: Sufficient funds? -->
  <polygon points="320,322 345,297 370,322 345,347" fill="white" stroke="#B87333" stroke-width="1.5"/>
  <text x="345" y="326" text-anchor="middle" fill="#B87333" font-size="10" font-weight="bold">?</text>
  <text x="345" y="362" text-anchor="middle" fill="#444" font-size="8">Sufficient</text>
  <text x="345" y="372" text-anchor="middle" fill="#444" font-size="8">Funds?</text>

  <!-- TASK: Compliance check -->
  <rect x="400" y="296" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="400" y="296" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="400" y="300" width="120" height="6" fill="#E8F4EE"/>
  <text x="460" y="317" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Compliance</text>
  <text x="460" y="331" text-anchor="middle" fill="#1A1A18" font-size="10">Check</text>
  <text x="460" y="362" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- GATEWAY: Approved? -->
  <polygon points="562,322 587,297 612,322 587,347" fill="white" stroke="#B87333" stroke-width="1.5"/>
  <text x="587" y="326" text-anchor="middle" fill="#B87333" font-size="10" font-weight="bold">?</text>
  <text x="587" y="362" text-anchor="middle" fill="#444" font-size="8">Approved?</text>

  <!-- TASK: Execute transfer -->
  <rect x="630" y="296" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="630" y="296" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="630" y="300" width="120" height="6" fill="#E8F4EE"/>
  <text x="690" y="317" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Execute</text>
  <text x="690" y="331" text-anchor="middle" fill="#1A1A18" font-size="10">Transfer</text>
  <text x="690" y="362" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- TASK: Update audit log -->
  <rect x="780" y="296" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="780" y="296" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="780" y="300" width="120" height="6" fill="#E8F4EE"/>
  <text x="840" y="317" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Update Audit</text>
  <text x="840" y="331" text-anchor="middle" fill="#1A1A18" font-size="10">Log</text>
  <text x="840" y="362" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- TASK: Send notification -->
  <rect x="930" y="296" width="120" height="52" rx="5" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="930" y="296" width="120" height="10" rx="5" fill="#E8F4EE"/>
  <rect x="930" y="300" width="120" height="6" fill="#E8F4EE"/>
  <text x="990" y="317" text-anchor="middle" fill="#1A1A18" font-size="10" font-weight="bold">Send</text>
  <text x="990" y="331" text-anchor="middle" fill="#1A1A18" font-size="10">Notification</text>
  <text x="990" y="362" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- TASK: Reject + notify -->
  <rect x="780" y="420" width="120" height="52" rx="5" fill="white" stroke="#C0392B" stroke-width="1"/>
  <rect x="780" y="420" width="120" height="10" rx="5" fill="#FDECEA"/>
  <rect x="780" y="424" width="120" height="6" fill="#FDECEA"/>
  <text x="840" y="441" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="bold">Reject &amp;</text>
  <text x="840" y="455" text-anchor="middle" fill="#C0392B" font-size="10">Notify User</text>
  <text x="840" y="482" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- Insufficient funds rejection box -->
  <rect x="320" y="420" width="120" height="52" rx="5" fill="white" stroke="#C0392B" stroke-width="1"/>
  <rect x="320" y="420" width="120" height="10" rx="5" fill="#FDECEA"/>
  <rect x="320" y="424" width="120" height="6" fill="#FDECEA"/>
  <text x="380" y="441" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="bold">Insufficient</text>
  <text x="380" y="455" text-anchor="middle" fill="#C0392B" font-size="10">Funds — Notify</text>
  <text x="380" y="482" text-anchor="middle" fill="#8A8A84" font-size="8">Service Task</text>

  <!-- ── SEQUENCE FLOWS ── -->

  <!-- Customer lane flows -->
  <line x1="120" y1="152" x2="148" y2="152" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="268" y1="152" x2="320" y2="152" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="152" x2="400" y2="152" stroke="#1D5C3A" stroke-width="1.2" marker-end="url(#arr-grn)"/>
  <line x1="520" y1="152" x2="800" y2="152" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="840" y1="152" x2="960" y2="152" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Cross-lane: Authorize → Validate balance -->
  <line x1="460" y1="178" x2="460" y2="296" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Bank lane flows -->
  <line x1="208" y1="296" x2="208" y2="272" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="268" y1="322" x2="320" y2="322" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="370" y1="322" x2="400" y2="322" stroke="#1D5C3A" stroke-width="1.2" marker-end="url(#arr-grn)"/>
  <text x="382" y="314" fill="#1D5C3A" font-size="8">Yes</text>
  <line x1="520" y1="322" x2="562" y2="322" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="612" y1="322" x2="630" y2="322" stroke="#1D5C3A" stroke-width="1.2" marker-end="url(#arr-grn)"/>
  <text x="614" y="314" fill="#1D5C3A" font-size="8">Yes</text>
  <line x1="750" y1="322" x2="780" y2="322" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="900" y1="322" x2="930" y2="322" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Notification cross lane -->
  <line x1="990" y1="296" x2="990" y2="255" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <line x1="990" y1="255" x2="840" y2="255" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="840" y1="255" x2="820" y2="172" stroke="#555" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Failed: insufficient funds path -->
  <line x1="345" y1="347" x2="345" y2="420" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="350" y="388" fill="#C0392B" font-size="8">No</text>

  <!-- Failed: compliance rejected -->
  <line x1="587" y1="347" x2="587" y2="400" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="587" y1="400" x2="840" y2="400" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="840" y1="400" x2="840" y2="420" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="600" y="396" fill="#C0392B" font-size="8">Rejected</text>

  <!-- Reject notification cross-lane -->
  <line x1="900" y1="446" x2="980" y2="446" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="980" y1="446" x2="980" y2="246" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <!-- Insufficient funds → end fail -->
  <line x1="440" y1="446" x2="940" y2="446" stroke="#C0392B" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="46" y="490" width="1044" height="20" fill="#F5F2EB"/>
  <text x="56" y="503" fill="#8A8A84" font-size="8">Legend:</text>
  <line x1="100" y1="500" x2="130" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="134" y="503" fill="#444" font-size="8">Sequence Flow</text>
  <line x1="210" y1="500" x2="240" y2="500" stroke="#C0392B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="244" y="503" fill="#444" font-size="8">Exception / Error Path</text>
  <line x1="370" y1="500" x2="400" y2="500" stroke="#555" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="404" y="503" fill="#444" font-size="8">Message Flow (cross-lane)</text>
  <circle cx="525" cy="500" r="7" fill="none" stroke="#1D5C3A" stroke-width="2"/>
  <circle cx="525" cy="500" r="4" fill="#1D5C3A"/>
  <text x="536" y="503" fill="#444" font-size="8">Start Event</text>
  <circle cx="610" cy="500" r="7" fill="none" stroke="#1D5C3A" stroke-width="2.5"/>
  <circle cx="610" cy="500" r="5" fill="#1D5C3A"/>
  <text x="621" y="503" fill="#444" font-size="8">End Event</text>
  <polygon points="690,500 700,492 710,500 700,508" fill="white" stroke="#B87333" stroke-width="1.2"/>
  <text x="715" y="503" fill="#444" font-size="8">Exclusive Gateway (XOR)</text>
  <rect x="800" y="494" width="30" height="14" rx="3" fill="white" stroke="#888" stroke-width="1"/>
  <text x="815" y="503" text-anchor="middle" fill="#444" font-size="7">Task</text>
  <text x="834" y="503" fill="#444" font-size="8">Activity</text>
</svg>
